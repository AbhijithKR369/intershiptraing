{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Trainer | {{ course.title }}</title>
    <link rel="stylesheet" href="{% static 'css/assign_trainer.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="fade-in">

<div class="bg-scene">
    <div class="bg-img"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
</div>

<div class="main-wrapper">
    <div class="assign-card">

        <svg class="corner-ornament tl" viewBox="0 0 40 40" fill="none">
            <path d="M2 2 L14 2 L14 5 L5 5 L5 14 L2 14 Z" fill="#c9a96e"/>
            <path d="M2 2 L2 14" stroke="#c9a96e" stroke-width="0.5"/>
            <path d="M2 2 L14 2" stroke="#c9a96e" stroke-width="0.5"/>
        </svg>
        <svg class="corner-ornament br" viewBox="0 0 40 40" fill="none">
            <path d="M2 2 L14 2 L14 5 L5 5 L5 14 L2 14 Z" fill="#c9a96e"/>
            <path d="M2 2 L2 14" stroke="#c9a96e" stroke-width="0.5"/>
            <path d="M2 2 L14 2" stroke="#c9a96e" stroke-width="0.5"/>
        </svg>

        <header class="header-section">
            <div class="header-icon">
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z" stroke="#c9a96e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6 12v5c3 3 9 3 12 0v-5" stroke="#c9a96e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="eyebrow">
                <span class="eyebrow-line"></span>
                Course Assignment
                <span class="eyebrow-line r"></span>
            </div>
            <h1>Assign <em>Trainer</em></h1>
            <p>Course: <span class="highlight">{{ course.title }}</span></p>
        </header>

        <form method="POST" class="assign-form">
            {% csrf_token %}

            <div class="form-body">
                <div class="input-group">
                    <label class="field-label">Select Approved Trainer</label>
                    <div class="select-wrapper">
                        <select name="trainer" id="trainerSelect" onchange="showDetails()" required>
                            <option value="">Choose a professional...</option>
                            {% for app in approved_apps %}
                                <option
                                    value="{{ app.trainer.id }}"
                                    data-email="{{ app.trainer.profile.email }}"
                                    data-qualification="{{ app.trainer.profile.qualification }}"
                                    data-place="{{ app.trainer.profile.place }}"
                                >
                                    {{ app.trainer.username }}
                                </option>
                            {% empty %}
                                <option disabled>No available trainers found</option>
                            {% endfor %}
                        </select>
                        <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                </div>

                <div id="trainerDetails" class="trainer-info-card">
                    <div class="info-header">
                        <span class="pulse-dot"></span>
                        <span class="info-title">Trainer Profile Preview</span>
                    </div>
                    <div class="info-grid">
                        <div class="info-row">
                            <span class="info-label">Email Address</span>
                            <span class="info-value" id="email"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Qualifications</span>
                            <span class="info-value" id="qualification"></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Primary Location</span>
                            <span class="info-value" id="place"></span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Confirm Assignment</span>
                    <div class="btn-ripple"></div>
                </button>
            </div>
        </form>

        <div class="divider"></div>

        <div class="footer-section">
            <a href="{% url 'company_dashboard' %}" class="back-link">← Return to Admin Panel</a>
        </div>

    </div>
</div>

<script>
function showDetails() {
    var select = document.getElementById("trainerSelect");
    var selected = select.options[select.selectedIndex];
    var detailsBox = document.getElementById("trainerDetails");

    if (!selected.value) {
        detailsBox.classList.remove("visible");
        return;
    }

    document.getElementById("email").innerText = selected.getAttribute("data-email") || 'N/A';
    document.getElementById("qualification").innerText = selected.getAttribute("data-qualification") || 'N/A';
    document.getElementById("place").innerText = selected.getAttribute("data-place") || 'Remote';

    detailsBox.classList.add("visible");
}
</script>

</body>
</html>
