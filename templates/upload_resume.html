{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume | {{ course.title }}</title>
    <link rel="stylesheet" href="{% static 'css/upload_resume.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-soft">

<div class="main-wrapper fade-in">
    <div class="upload-card-v2 scale-up">
        <header class="upload-header">
            <div class="icon-pulse">
                <span class="pulse-icon">📄</span>
            </div>
            <h1>Submit Your Resume</h1>
            <p>Applying for: <span class="highlight">{{ course.title }}</span></p>
        </header>

        <form method="POST" enctype="multipart/form-data" class="modern-upload-form">
            {% csrf_token %}
            
            <div class="dropzone-v2" id="dropzone-container">
                <input type="file" name="resume" id="resume-input" required hidden onchange="showFileName()">
                <label for="resume-input" class="dropzone-label" id="dropzone-ui">
                    <div class="upload-visual">
                        <div class="cloud-icon">☁️</div>
                        <span class="main-text">Click to browse your files</span>
                        <span class="sub-text">Supported format: PDF (Max 5MB)</span>
                    </div>
                </label>
            </div>

            <div id="file-info" class="file-status-box" style="display: none;">
                <div class="file-details">
                    <span class="file-check">✅</span>
                    <span id="file-name" class="file-name-text"></span>
                </div>
                <button type="button" class="reset-upload-btn" onclick="resetUpload()" title="Remove file">✕</button>
            </div>

            <button type="submit" class="submit-app-btn">
                <span>Finalize Application</span>
                <div class="btn-shine-fx"></div>
            </button>
        </form>

        <div class="divider-v2"></div>
        
        <div class="cancel-footer">
            <a href="{% url 'view_courses' %}" class="cancel-link">← Cancel and Go Back</a>
        </div>
    </div>
</div>

<script>
function showFileName() {
    const input = document.getElementById('resume-input');
    const info = document.getElementById('file-info');
    const nameDisplay = document.getElementById('file-name');
    const dropzone = document.getElementById('dropzone-ui');
    const container = document.getElementById('dropzone-container');

    if (input.files.length > 0) {
        nameDisplay.innerText = input.files[0].name;
        info.style.display = "flex";
        container.classList.add('is-ready');
        dropzone.querySelector('.main-text').innerText = "File Selected!";
    }
}

function resetUpload() {
    const input = document.getElementById('resume-input');
    const info = document.getElementById('file-info');
    const dropzone = document.getElementById('dropzone-ui');
    const container = document.getElementById('dropzone-container');
    
    input.value = "";
    info.style.display = "none";
    container.classList.remove('is-ready');
    dropzone.querySelector('.main-text').innerText = "Click to browse your files";
}
</script>

</body>
</html>
