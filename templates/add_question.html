<h2>Add Quiz Question</h2>

<!-- ✅ Success Message -->
{% if message %}
    <p style="color: green; font-weight: bold;">
        {{ message }}
    </p>
{% endif %}

<!-- ✅ Question Count -->
<p><b>Total Questions:</b> {{ count }}</p>

<hr>

<form method="POST">
    {% csrf_token %}

    <label>Question:</label><br>
    <input type="text" name="question" required><br><br>

    <label>Option 1:</label><br>
    <input type="text" name="opt1" required><br><br>

    <label>Option 2:</label><br>
    <input type="text" name="opt2" required><br><br>

    <label>Option 3:</label><br>
    <input type="text" name="opt3" required><br><br>

    <label>Option 4:</label><br>
    <input type="text" name="opt4" required><br><br>

    <label>Correct Option (1-4):</label><br>
    <input type="number" name="correct" min="1" max="4" required><br><br>

    <button type="submit">Add Question</button>
    <button type="submit" name="new_batch">Create New Quiz Batch</button>
<button type="submit">Add to Current Batch</button>
</form>
