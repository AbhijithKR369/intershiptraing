{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account | Join the Platform</title>
    <link rel="stylesheet" href="{% static 'css/register.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient">

<div class="bg-scene">
    <div class="bg-img"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
</div>

<div class="main-wrapper fade-in">
    <div class="register-card-v2">

        <!-- Corner ornaments -->
        <svg class="corner-ornament tl" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2 L14 2 L14 5 L5 5 L5 14 L2 14 Z" fill="#c9a96e"/>
            <path d="M2 2 L2 14" stroke="#c9a96e" stroke-width="0.5"/>
            <path d="M2 2 L14 2" stroke="#c9a96e" stroke-width="0.5"/>
        </svg>
        <svg class="corner-ornament br" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 2 L14 2 L14 5 L5 5 L5 14 L2 14 Z" fill="#c9a96e"/>
            <path d="M2 2 L2 14" stroke="#c9a96e" stroke-width="0.5"/>
            <path d="M2 2 L14 2" stroke="#c9a96e" stroke-width="0.5"/>
        </svg>

        <header class="reg-header">
            <div class="brand-logo">
                <svg class="logo-icon" width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 3 L20 8 L20 18 L13 23 L6 18 L6 8 Z" stroke="#c9a96e" stroke-width="1.4" stroke-linejoin="round"/>
                    <path d="M13 8 L13 18 M9 11 L17 11 M9 15 L17 15" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="eyebrow">
                <span class="eyebrow-line"></span>
                 
                <span class="eyebrow-line r"></span>
            </div>
            <h1>Create Your <em>Account</em></h1>
            <p>Join our ecosystem of students, trainers, and companies.</p>
        </header>

        <form method="POST" onsubmit="return validateForm()" class="modern-form">
            {% csrf_token %}

            <div class="form-step">
                <div class="section-badge">
                    <div class="badge-line"></div>
                    <span class="step-title">Account Security</span>
                    <div class="badge-line"></div>
                </div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" name="username" required placeholder="johndoe">
                    </div>
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="john@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••">
                    </div>
                </div>
            </div>

            <div class="line-divider"></div>

            <div class="form-step">
                <div class="section-badge">
                    <div class="badge-line"></div>
                    <span class="step-title">Profile Information</span>
                    <div class="badge-line"></div>
                </div>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" name="full_name" placeholder="Johnathan Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="text" name="phone" placeholder="+1 234 567 890">
                    </div>
                    <div class="input-group">
                        <label>Select Role</label>
                        <div class="select-wrapper">
                            <select name="role" id="role" onchange="showFields()" required>
                                <option value="">Choose your path...</option>
                                <option value="student">Student</option>
                                <option value="company">Company</option>
                                <option value="trainer">Trainer</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Professional Domain</label>
                        <div class="select-wrapper">
                            <select name="domain">
                                <option value="it">Information Technology</option>
                                <option value="cloud">Cloud Computing</option>
                                <option value="management">Management</option>
                                <option value="ai">Artificial Intelligence</option>
                                <option value="data">Data Science</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div id="student_fields" class="dynamic-container">
                <div class="input-grid">
                    <div class="input-group">
                        <label>College</label>
                        <input type="text" name="college" placeholder="University Name">
                    </div>
                    <div class="input-group">
                        <label>Department</label>
                        <input type="text" name="department" placeholder="e.g. Computer Science">
                    </div>
                </div>
            </div>

            <div id="company_fields" class="dynamic-container">
                <div class="input-grid">
                    <div class="input-group">
                        <label>Company Name</label>
                        <input type="text" name="company_name" placeholder="Tech Corp">
                    </div>
                    <div class="input-group">
                        <label>Headquarters Location</label>
                        <input type="text" name="location" placeholder="San Francisco, CA">
                    </div>
                </div>
            </div>

            <div id="trainer_fields" class="dynamic-container">
                <div class="input-grid">
                    <div class="input-group">
                        <label>Primary Qualification</label>
                        <input type="text" name="qualification" placeholder="PhD, Senior Dev, etc.">
                    </div>
                    <div class="input-group">
                        <label>Place of Practice</label>
                        <input type="text" name="place" placeholder="New York, NY">
                    </div>
                </div>
            </div>

            <button type="submit" class="register-main-btn">
                <span>Create My Account</span>
                <div class="btn-shine"></div>
            </button>

            <div class="form-footer">
                <p>Already a member? <a href="/login/">Log in here</a></p>
            </div>
        </form>
    </div>
</div>

<script>
function showFields() {
    let role = document.getElementById("role").value;
    const sections = ["student_fields", "company_fields", "trainer_fields"];

    sections.forEach(id => {
        let el = document.getElementById(id);
        el.classList.remove("slide-in-active");
        // Small delay before hiding so exit is smooth
        setTimeout(() => { if (!el.classList.contains("slide-in-active")) el.style.display = "none"; }, 300);
    });

    if (role) {
        let activeDiv = document.getElementById(role + "_fields");
        activeDiv.style.display = "block";
        setTimeout(() => { activeDiv.classList.add("slide-in-active"); }, 10);
    }
}

function validateForm() {
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirm_password").value;
    if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return false;
    }
    return true;
}
</script>

</body>
</html>
