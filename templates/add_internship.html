{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Internship | Hiring Portal</title>
    <link rel="stylesheet" href="{% static 'css/add_internship.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="entry-anim">

<div class="bg-scene">
    <div class="bg-img"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
</div>

<div class="main-wrapper">
    <div class="internship-card">

        <svg class="corner-ornament tl" viewBox="0 0 40 40" fill="none">
            <path d="M2 2 L14 2 L14 5 L5 5 L5 14 L2 14 Z" fill="#c9a96e"/>
            <path d="M2 2 L2 14" stroke="#c9a96e" stroke-width="0.5"/>
            <path d="M2 2 L14 2" stroke="#c9a96e" stroke-width="0.5"/>
        </svg>
        <svg class="corner-ornament br" viewBox="0 0 40 40" fill="none">
            <path d="M2 2 L14 2 L14 5 L5 5 L5 14 L2 14 Z" fill="#c9a96e"/>
            <path d="M2 2 L2 14" stroke="#c9a96e" stroke-width="0.5"/>
            <path d="M2 2 L14 2" stroke="#c9a96e" stroke-width="0.5"/>
        </svg>

        <header class="header-section">
            <div class="icon-box">
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                    <rect x="3" y="8" width="20" height="14" rx="2" stroke="#c9a96e" stroke-width="1.4"/>
                    <path d="M8 8 V6 C8 4.9 8.9 4 10 4 H16 C17.1 4 18 4.9 18 6 V8" stroke="#c9a96e" stroke-width="1.4" stroke-linecap="round"/>
                    <path d="M3 14 H23" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
                    <circle cx="13" cy="14" r="1.5" fill="#c9a96e"/>
                </svg>
            </div>
            <div class="eyebrow">
                <span class="eyebrow-line"></span>
                Hiring Portal
                <span class="eyebrow-line r"></span>
            </div>
            <h1>Post an <em>Internship</em></h1>
            <p>Find the best talent by providing clear internship details.</p>
        </header>

        <form method="POST" class="form-container">
            {% csrf_token %}

            <div class="form-content">
                <div class="input-row">
                    <div class="input-group">
                        <label class="field-label">Internship Title</label>
                        <input type="text" name="title" placeholder="e.g. Frontend Developer Intern" required>
                    </div>
                    <div class="input-group">
                        <label class="field-label">Office Location</label>
                        <input type="text" name="location" placeholder="e.g. Remote / New York, NY" required>
                    </div>
                </div>

                <div class="input-group">
                    <label class="field-label">Internship Description</label>
                    <textarea name="description" rows="6" placeholder="Describe the roles, responsibilities, and perks..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Publish Opportunity</span>
                    <i class="btn-overlay"></i>
                </button>
            </div>
        </form>

        <div class="divider"></div>

        <div class="footer-section">
            <a href="{% url 'company_dashboard' %}" class="back-link">← Back to Dashboard</a>
        </div>

    </div>
</div>

</body>
</html>
