{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Internship | Hiring Portal</title>
    <link rel="stylesheet" href="{% static 'css/add_internship.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="entry-anim">

<div class="main-wrapper">
    <div class="internship-card slide-up">
        <header class="header-section">
            <div class="badge">Hiring</div>
            <h1>Post an Internship</h1>
            <p>Find the best talent by providing clear internship details.</p>
        </header>

        <form method="POST" class="form-container">
            {% csrf_token %}
            
            <div class="form-content">
                <div class="input-row">
                    <div class="input-group">
                        <label>Internship Title</label>
                        <input type="text" name="title" placeholder="e.g. Frontend Developer Intern" required>
                    </div>
                    <div class="input-group">
                        <label>Office Location</label>
                        <input type="text" name="location" placeholder="e.g. Remote / New York, NY" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Internship Description</label>
                    <textarea name="description" rows="6" placeholder="Describe the roles, responsibilities, and perks..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Publish Opportunity</span>
                    <i class="btn-overlay"></i>
                </button>
            </div>
        </form>

        <div class="divider"></div>
        
        <div class="footer-section">
            <a href="{% url 'company_dashboard' %}" class="back-link">
                ← Back to Dashboard
            </a>
        </div>
    </div>
</div>

</body>
</html>
